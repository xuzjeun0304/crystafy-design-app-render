services:
  - type: web
    name: crystafy-design-app
    runtime: node
    rootDir: crystafy-design-app
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SHOPIFY_SHOP_DOMAIN
        value: crystafy.myshopify.com
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: DESIGN_PRODUCT_STATUS
        value: ACTIVE
      - key: PUBLISH_DESIGN_PRODUCTS
        value: "true"
      - key: DESIGN_PRODUCT_TYPE
        value: Custom Bracelet
      - key: DESIGN_PRODUCT_VENDOR
        value: Crystafy
      - key: DESIGN_PRODUCT_TAGS
        value: custom-design,hidden-design-product
      - key: ALLOW_UNVERIFIED_LOCAL_REQUESTS
        value: "false"
      - key: DRY_RUN_CREATE_PRODUCT
        value: "false"
